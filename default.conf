server {
    listen       80;
    server_name  localhost;

    # Serve files from your public directory
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Error pages
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # (Everything else stays removed or commented out)
}
